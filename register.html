<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(108, 99, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .circle-1 { width: 300px; height: 300px; top: -100px; left: -100px; }
        .circle-2 { width: 500px; height: 500px; bottom: -200px; right: -150px; animation-delay: -5s; }
        .circle-3 { width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            position: relative;
            width: 600px;
            max-width: 95%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            padding: 40px 35px 0;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #b8c6db;
        }

        .form-container {
            padding: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .password-toggle:hover {
            color: #6c63ff;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b8c6db;
            font-weight: 500;
            font-size: 13px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #6c63ff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .radio-group {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6c63ff;
        }

        .radio-option label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #5a52d6);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .register-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .register-btn.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .social-login {
            text-align: center;
            margin-top: 30px;
        }

        .social-login p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-bottom: 18px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 28%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .social-login p::before { left: 0; }
        .social-login p::after { right: 0; }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b8c6db;
            font-size: 20px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-icons a:hover {
            background: #6c63ff;
            color: white;
            transform: translateY(-3px);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding: 20px 0 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .login-link p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        .login-link a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            text-align: center;
            padding-bottom: 35px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 13px;
        }

        .back-link a:hover {
            color: #6c63ff;
        }

        .error-message, .success-message {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .error-message {
            background: rgba(255, 82, 82, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .success-message {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        @media (max-width: 550px) {
            .header { padding: 30px 25px 0; }
            .form-container { 
                padding: 20px; 
                grid-template-columns: 1fr; 
                gap: 10px; 
            }
            .form-group.full-width { grid-column: span 1; }
            .radio-group { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">Portal.</div>
            <h2>Create Account</h2>
            <p>Join us to start your journey</p>
        </div>

        <div class="form-container">
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regFullname" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username">
                </div>
                <div class="form-group full-width">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email">
                </div>
                <div class="form-group full-width">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password">
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-group full-width">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password">
                    <button type="button" class="password-toggle" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="form-group full-width">
                    <label>Pilih Kelas</label>
                    <select id="regClass">
                        <option value="Web Development">🌐 Web Development</option>
                        <option value="Mobile Development">📱 Mobile Development</option>
                        <option value="UI/UX Design">🎨 UI/UX Design</option>
                        <option value="Data Science">📊 Data Science</option>
                        <option value="Digital Marketing">📈 Digital Marketing</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Status</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="status" value="active" checked> 
                            <span>✅ Aktif</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="status" value="inactive"> 
                            <span>⛔ Tidak Aktif</span>
                        </label>
                    </div>
                </div>
                <div class="form-group full-width">
                    <button type="submit" class="register-btn">Create Account</button>
                    
                    <div class="error-message" id="registerError"></div>
                    <div class="success-message" id="registerSuccess"></div>
                </div>
            </form>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Portfolio</a>
            </div>
        </div>
    </div>

    <script>
        function getUsers() {
            const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
            if (users.length === 0) {
                users.push({ 
                    fullname: 'Admin User',
                    username: 'admin', 
                    email: 'admin@example.com', 
                    password: 'admin123',
                    class: 'Web Development',
                    status: 'active',
                    registeredDate: new Date().toISOString()
                });
                localStorage.setItem('appUsers', JSON.stringify(users));
            }
            return users;
        }

        function saveUsers(users) {
            localStorage.setItem('appUsers', JSON.stringify(users));
        }

        function showRegisterError(msg) {
            const errorDiv = document.getElementById('registerError');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            document.getElementById('registerSuccess').style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }

        // Toggle password visibility
        function togglePassword(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            const icon = button.querySelector('i');
            
            button.addEventListener('click', function() {
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        }

        togglePassword('regPassword', 'togglePassword');
        togglePassword('regConfirmPassword', 'toggleConfirmPassword');

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const registerBtn = document.querySelector('.register-btn');
            registerBtn.classList.add('loading');
            registerBtn.textContent = 'Creating Account...';
            
            const fullname = document.getElementById('regFullname').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const selectedClass = document.getElementById('regClass').value;
            const status = document.querySelector('input[name="status"]:checked').value;
            
            if (!fullname || !username || !email || !password || !confirmPassword) {
                showRegisterError('❌ Semua field harus diisi!');
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Create Account';
                return;
            }
            
            if (password !== confirmPassword) {
                showRegisterError('❌ Password dan konfirmasi password tidak cocok!');
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Create Account';
                return;
            }
            
            if (fullname.length < 3) {
                showRegisterError('❌ Nama lengkap minimal 3 karakter!');
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Create Account';
                return;
            }
            
            if (username.length < 3) {
                showRegisterError('❌ Username minimal 3 karakter!');
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Create Account';
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showRegisterError('❌ Email tidak valid!');
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Create Account';
                return;
            }
            
            if (password.length < 6) {
                showRegisterError('❌ Password minimal 6 karakter!');
                registerBtn.classList.remove('loading');
                registerBtn.textContent = 'Create Account';
                return;
            }
            
            // Simulate loading delay
            setTimeout(() => {
                let users = getUsers();
                
                if (users.find(u => u.username === username)) {
                    showRegisterError('❌ Username sudah terpakai!');
                    registerBtn.classList.remove('loading');
                    registerBtn.textContent = 'Create Account';
                    return;
                }
                
                if (users.find(u => u.email === email)) {
                    showRegisterError('❌ Email sudah terdaftar!');
                    registerBtn.classList.remove('loading');
                    registerBtn.textContent = 'Create Account';
                    return;
                }
                
                const newUser = { 
                    fullname, 
                    username, 
                    email, 
                    password,
                    class: selectedClass,
                    status: status,
                    registeredDate: new Date().toISOString()
                };
                
                users.push(newUser);
                saveUsers(users);
                
                document.getElementById('regFullname').value = '';
                document.getElementById('regUsername').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirmPassword').value = '';
                document.getElementById('regClass').value = 'Web Development';
                document.querySelector('input[name="status"][value="active"]').checked = true;
                
                showRegisterSuccess('✅ Pendaftaran berhasil! Mengalihkan ke halaman login...');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }, 1500); // Simulate 1.5 second loading
        });
    </script>
</body>
</html>
