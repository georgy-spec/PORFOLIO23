<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(108, 99, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            left: -100px;
        }

        .circle-2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            right: -150px;
            animation-delay: -5s;
        }

        .circle-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* Main Container */
        .container {
            position: relative;
            width: 450px;
            max-width: 90%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 35px 0;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #b8c6db;
        }

        /* Form */
        .form-container {
            padding: 35px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .password-toggle:hover {
            color: #6c63ff;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b8c6db;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: #6c63ff;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Remember Me */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #6c63ff;
        }

        .remember-me label {
            color: #b8c6db;
            font-size: 13px;
            cursor: pointer;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #5a52d6);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .login-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .login-btn.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Social Login */
        .social-login {
            text-align: center;
            margin-top: 30px;
        }

        .social-login p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-bottom: 18px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 28%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b8c6db;
            font-size: 20px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .social-icons a:hover {
            background: #6c63ff;
            color: white;
            transform: translateY(-3px);
        }

        /* Register Link */
        .register-link {
            text-align: center;
            margin-top: 25px;
            padding: 20px 0 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .register-link p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        .register-link a {
            color: #6c63ff;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Back to Portfolio */
        .back-link {
            text-align: center;
            padding-bottom: 35px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: #6c63ff;
        }

        /* Messages */
        .error-message, .success-message {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .error-message {
            background: rgba(255, 82, 82, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 82, 82, 0.3);
        }

        .success-message {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .header {
                padding: 30px 25px 0;
            }
            .form-container {
                padding: 25px;
            }
            .logo {
                font-size: 26px;
            }
            .header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">Portfolio.</div>
            <h2>Welcome Back!</h2>
            <p>Sign in to continue to your account</p>
        </div>

        <div class="form-container">
            <form id="loginForm">
                <div class="form-group">
                    <label>Username / Email</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username or email" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
                
                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>
            </form>

            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-google"></i></a>
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-apple"></i></a>
                </div>
            </div>

            <div class="register-link">
                <p>Don't have an account? <a href="register.html">Create Account</a></p>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Portfolio</a>
            </div>
        </div>
    </div>

    <script>
        // ============ GET USERS FROM LOCALSTORAGE ============
        function getUsers() {
            const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
            if (users.length === 0) {
                users.push({ 
                    fullname: 'Admin User',
                    username: 'admin', 
                    email: 'admin@example.com', 
                    password: 'admin123',
                    class: 'Web Development',
                    status: 'active',
                    registeredDate: new Date().toISOString()
                });
                localStorage.setItem('appUsers', JSON.stringify(users));
            }
            return users;
        }

        function showLoginError(msg) {
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showLoginSuccess(msg) {
            const successDiv = document.getElementById('loginSuccess');
            const errorDiv = document.getElementById('loginError');
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 2000);
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const loginBtn = document.querySelector('.login-btn');
            loginBtn.classList.add('loading');
            loginBtn.textContent = 'Signing In...';
            
            const usernameOrEmail = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!usernameOrEmail || !password) {
                showLoginError('❌ Username/Email and password are required!');
                loginBtn.classList.remove('loading');
                loginBtn.textContent = 'Sign In';
                return;
            }
            
            // Simulate loading delay
            setTimeout(() => {
                const users = getUsers();
                const user = users.find(u => (u.username === usernameOrEmail || u.email === usernameOrEmail) && u.password === password);
                
                if (user) {
                    // Cek status aktif
                    if (user.status !== 'active') {
                        showLoginError('❌ Your account is inactive! Please contact admin.');
                        loginBtn.classList.remove('loading');
                        loginBtn.textContent = 'Sign In';
                        return;
                    }
                    
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    showLoginSuccess('✅ Login successful! Redirecting...');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showLoginError('❌ Invalid username/email or password!');
                    document.getElementById('loginPassword').value = '';
                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = 'Sign In';
                }
            }, 1000); // Simulate 1 second loading
        });

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('loginPassword');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Remember me functionality
        document.addEventListener('DOMContentLoaded', function() {
            const rememberMe = document.getElementById('rememberMe');
            const usernameInput = document.getElementById('loginUsername');
            
            // Load saved username if remember me was checked
            const savedUsername = localStorage.getItem('rememberedUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberMe.checked = true;
            }
            
            // Save username when form is submitted
            document.getElementById('loginForm').addEventListener('submit', function() {
                if (rememberMe.checked) {
                    localStorage.setItem('rememberedUsername', usernameInput.value);
                } else {
                    localStorage.removeItem('rememberedUsername');
                }
            });
        });
    </script>
</body>
</html>
